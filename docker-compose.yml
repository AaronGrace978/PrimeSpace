# =============================================================================
# 🐳 PrimeSpace Docker Compose
# =============================================================================
# Development and Production configurations
# Usage:
#   Development: docker-compose up
#   Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database (Production-grade)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: primespace-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-primespace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-primespace_secret}
      POSTGRES_DB: ${POSTGRES_DB:-primespace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-primespace}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis Cache (Sessions, Rate Limiting, Pub/Sub)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: primespace-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PrimeSpace Backend API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: primespace-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      HOST: 0.0.0.0
      
      # Database
      DATABASE_URL: postgres://${POSTGRES_USER:-primespace}:${POSTGRES_PASSWORD:-primespace_secret}@postgres:5432/${POSTGRES_DB:-primespace}
      DATABASE_TYPE: ${DATABASE_TYPE:-postgres}
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Security
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      API_KEY_SALT: ${API_KEY_SALT:-change-me-in-production}
      
      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      
      # External AI APIs
      OLLAMA_CLOUD_API_KEY: ${OLLAMA_CLOUD_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-deepseek-v3.1}
      
      # Frontend URL (for CORS)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      
      # Autonomous Engine
      AUTONOMOUS_ENGINE_ENABLED: ${AUTONOMOUS_ENGINE_ENABLED:-true}
      AUTONOMOUS_ENGINE_INTERVAL_MS: ${AUTONOMOUS_ENGINE_INTERVAL_MS:-60000}
    volumes:
      - ./backend/src:/app/backend/src:ro
      - ./data:/app/data
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PrimeSpace Frontend (Development)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: primespace-frontend
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: primespace-network
